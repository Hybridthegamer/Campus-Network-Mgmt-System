<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Wireless Campus NMS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%); min-height: 100vh; }
    .login-card { border-radius: 1rem; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
    .brand-icon { font-size: 3rem; color: #0d6efd; }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center">
  <div class="container" style="max-width:420px">
    <div class="text-center mb-4">
      <i class="bi bi-wifi brand-icon"></i>
      <h4 class="text-white fw-bold mt-2">Wireless Campus NMS</h4>
      <p class="text-muted small">Network Management System</p>
    </div>
    <div class="card login-card border-0">
      <div class="card-body p-4">
        <h5 class="card-title mb-4 fw-semibold">Sign In</h5>
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }} py-2 small">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}
        <form method="POST" novalidate>
          <div class="mb-3">
            <label class="form-label fw-semibold small">Username</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold small">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" name="password" id="passwordInput" class="form-control" placeholder="Enter password" required>
              <button class="btn btn-outline-secondary" type="button" id="togglePwd">
                <i class="bi bi-eye" id="eyeIcon"></i>
              </button>
            </div>
          </div>
          <div class="mb-4 form-check">
            <input type="checkbox" class="form-check-input" name="remember" id="remember">
            <label class="form-check-label small" for="remember">Remember me</label>
          </div>
          <button type="submit" class="btn btn-primary w-100 fw-semibold">
            <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
          </button>
        </form>
      </div>
    </div>
    <div class="text-center mt-3">
      <small class="text-muted">Default: <code class="text-info">superadmin</code> / <code class="text-info">Admin123!</code></small>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.getElementById('togglePwd').addEventListener('click', function() {
      const pwd = document.getElementById('passwordInput');
      const icon = document.getElementById('eyeIcon');
      if (pwd.type === 'password') { pwd.type = 'text'; icon.className = 'bi bi-eye-slash'; }
      else { pwd.type = 'password'; icon.className = 'bi bi-eye'; }
    });
  </script>
</body>
</html>
